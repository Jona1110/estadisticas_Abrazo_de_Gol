<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --gold: #FFD700; --dark: #0f0f0f; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: transparent; overflow: hidden; display: flex; height: 100vh; width: 100vw; }
        
        /* --- ÁREA DE TRANSMISIÓN --- */
        .display-area { flex-grow: 1; position: relative; display: flex; align-items: flex-end; padding: 0 0 60px 60px; }
        
        .stat-bar { 
            display: flex; align-items: stretch; opacity: 0; 
            transform: translateX(-50px) skewX(-12deg); 
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); 
            filter: drop-shadow(5px 15px 25px rgba(0,0,0,0.5));
            height: 85px;
        }
        
        .stat-bar.active { opacity: 1; transform: translateX(0) skewX(-12deg); }

        /* BLOQUE EVENTO (GOL, PENAL...) */
        .event-label { 
            color: white; padding: 0 40px; 
            font-weight: 900; text-transform: uppercase; 
            font-size: 28px; display: flex; align-items: center; justify-content: center;
            min-width: 180px; z-index: 5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* Colores dinámicos */
        .bg-gol { background: linear-gradient(135deg, #001f3f, #004488); border-bottom: 6px solid #00aaff; }
        .bg-penal { background: linear-gradient(135deg, #ff4500, #ff0000); border-bottom: 6px solid #fff; }
        .bg-amarilla { background: linear-gradient(135deg, #ffcc00, #ffaa00); color: black !important; border-bottom: 6px solid #333; }
        .bg-roja { background: linear-gradient(135deg, #ee0000, #880000); border-bottom: 6px solid #000; }
        .bg-falta { background: linear-gradient(135deg, #333, #111); border-bottom: 6px solid #666; }
        .bg-fuerade { background: linear-gradient(135deg, #556b2f, #228b22); border-bottom: 6px solid #fff; }
        .bg-agua { background: linear-gradient(135deg, #00aaff, #0055ff); border-bottom: 6px solid #fff; }

        /* BLOQUE CONTENIDO */
        .info-content { 
            background: #fff; color: #1a1a1a; padding: 0 50px; 
            min-width: 500px; display: flex; align-items: center;
            border-right: 12px solid var(--gold);
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1), color 0.8s;
            position: relative; overflow: hidden;
        }

        .no-skew { transform: skewX(12deg); display: flex; align-items: center; gap: 20px; width: 100%; height: 100%; }

        /* Contenedor con animación suave de contenido */
        .content-fader {
            display: flex; align-items: center; gap: 15px;
            transition: all 0.6s ease;
            width: 100%;
        }

        .logo-frame {
            width: 65px; height: 65px; background: #fff; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            border: 2px solid rgba(0,0,0,0.1); overflow: hidden; flex-shrink: 0;
        }
        .logo-frame img { width: 85%; height: 85%; object-fit: contain; }

        .player-num {
            font-weight: 900; font-size: 38px; font-style: italic;
            color: var(--gold); text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            display: none; line-height: 1; margin-right: 5px;
        }

        .text-group { display: flex; flex-direction: column; justify-content: center; }
        .player-name { font-size: 36px; font-weight: 900; text-transform: uppercase; line-height: 0.9; white-space: nowrap; }
        .team-name { font-size: 15px; opacity: 0.7; text-transform: uppercase; font-weight: 700; margin-top: 5px; }

        /* Animación suave para el cambio de texto */
        .fade-out { opacity: 0; transform: translateY(-10px); }
        .fade-in { opacity: 1; transform: translateY(0); }

        /* --- PANEL DE CONTROL --- */
        .admin-panel {
            background: #0f0f0f; color: #fff; padding: 20px; width: 400px;
            height: 100vh; border-left: 4px solid var(--gold); box-sizing: border-box;
            display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; overflow-y: auto;
        }
        .team-box { background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        h2 { font-size: 16px; color: var(--gold); text-align: center; margin: 0 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        label { font-size: 10px; color: #888; font-weight: bold; }
        input[type="text"], input[type="color"] { width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; margin: 4px 0; box-sizing: border-box;}
        .grid-alerts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .btn-alert { background: #333; color: #fff; border: none; padding: 10px 5px; font-size: 9px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-alert.active { background: var(--gold); color: #000; }
        .btn-main { border: none; padding: 15px; font-weight: 900; border-radius: 6px; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

    <div class="display-area">
        <div class="stat-bar" id="notif-bar">
            <div id="event-label" class="event-label">GOL</div>
            <div id="info-box" class="info-content">
                <div class="no-skew">
                    <div id="logo-container" class="logo-frame"><img id="team-logo" src=""></div>
                    <div id="content-animator" class="content-fader">
                        <span id="display-num" class="player-num">10</span>
                        <div class="text-group">
                            <span id="display-player" class="player-name">¡GOOOOL!</span>
                            <span id="display-team" class="team-name">ABRAZO DE GOL</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-panel">
        <h2>ABRAZO DE GOL - CONTROL</h2>
        <div class="team-box">
            <label>LOCAL</label>
            <input type="text" id="name-l" value="Equipo Local">
            <input type="color" id="color-l" value="#003366">
            <input type="file" id="logo-l" style="font-size:10px" onchange="readLogo('l')">
        </div>
        <div class="team-box">
            <label>VISITANTE</label>
            <input type="text" id="name-v" value="Equipo Visita">
            <input type="color" id="color-v" value="#ee0000">
            <input type="file" id="logo-v" style="font-size:10px" onchange="readLogo('v')">
        </div>
        <label>EVENTO</label>
        <div class="grid-alerts">
            <button class="btn-alert active" onclick="setAlert('⚽ GOL', 'bg-gol', this)">GOL</button>
            <button class="btn-alert" onclick="setAlert('🥅 PENAL', 'bg-penal', this)">PENAL</button>
            <button class="btn-alert" onclick="setAlert('🟨 AMARILLA', 'bg-amarilla', this)">AMARILLA</button>
            <button class="btn-alert" onclick="setAlert('🟥 ROJA', 'bg-roja', this)">ROJA</button>
            <button class="btn-alert" onclick="setAlert('⚠️ FALTA', 'bg-falta', this)">FALTA</button>
            <button class="btn-alert" onclick="setAlert('🚩 FUERA L.', 'bg-fuerade', this)">FUERA</button>
        </div>
        <div style="display:flex; gap:5px; margin-top:5px">
            <input type="text" id="player-in" placeholder="Jugador">
            <input type="text" id="num-in" placeholder="N°" style="width:60px">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <button class="btn-main" style="background:#003366; color:#fff" onclick="lanzar('local')">LOCAL</button>
            <button class="btn-main" style="background:#ee0000; color:#fff" onclick="lanzar('visitante')">VISITA</button>
        </div>
        <button class="btn-alert" style="margin-top:10px; background:#00aaff" onclick="lanzarAgua()">💧 HIDRATACIÓN</button>
        <button class="btn-alert" style="margin-top:auto; background:#222; color:#888" onclick="ocultar()">OCULTAR</button>
    </div>

    <script>
        let selEvent = '⚽ GOL', selColor = 'bg-gol', timer, sequence, logoL = "", logoV = "";
        const frases = { '⚽ GOL': '¡GOOOOOOOL!', '🥅 PENAL': '¡PENAL!', '🟨 AMARILLA': '¡AMARILLA!', '🟥 ROJA': '¡EXPULSADO!', '⚠️ FALTA': '¡FALTA!', '🚩 FUERA L.': '¡FUERA DE LUGAR!' };

        function readLogo(side) {
            const file = document.getElementById('logo-' + side).files[0];
            const reader = new FileReader();
            reader.onloadend = () => { if(side === 'l') logoL = reader.result; else logoV = reader.result; }
            if(file) reader.readAsDataURL(file);
        }

        function setAlert(txt, cls, btn) {
            selEvent = txt; selColor = cls;
            document.querySelectorAll('.btn-alert').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function lanzar(bando) {
            clearTimeout(sequence);
            const player = document.getElementById('player-in').value;
            const num = document.getElementById('num-in').value;
            const team = (bando === 'local') ? document.getElementById('name-l').value : document.getElementById('name-v').value;
            const color = (bando === 'local') ? document.getElementById('color-l').value : document.getElementById('color-v').value;
            const logo = (bando === 'local') ? logoL : logoV;

            const bar = document.getElementById('notif-bar');
            const label = document.getElementById('event-label');
            const info = document.getElementById('info-box');
            const animator = document.getElementById('content-animator');

            // FASE 1: IMPACTO (GOL / EVENTO)
            bar.classList.remove('active');
            void bar.offsetWidth;
            
            animator.classList.remove('fade-in');
            document.getElementById('display-num').style.display = "none";
            document.getElementById('logo-container').style.display = "none";
            label.innerText = selEvent;
            label.className = "event-label " + selColor;
            info.style.background = "#ffffff";
            info.style.color = "#1a1a1a";
            document.getElementById('display-player').innerText = frases[selEvent];
            document.getElementById('display-team').innerText = "ABRAZO DE GOL";
            
            bar.classList.add('active');
            setTimeout(() => animator.classList.add('fade-in'), 100);

            // FASE 2: TRANSICIÓN SUAVE AL JUGADOR (A los 1.8 segundos)
            if(player) {
                sequence = setTimeout(() => {
                    animator.classList.add('fade-out'); // Desvanecer suave
                    
                    setTimeout(() => {
                        info.style.background = color;
                        const r = parseInt(color.substr(1,2),16), g = parseInt(color.substr(3,2),16), b = parseInt(color.substr(5,2),16);
                        const isLight = ((r*299 + g*587 + b*114) / 1000 > 125);
                        info.style.color = isLight ? "#000" : "#fff";
                        document.getElementById('display-num').style.color = isLight ? "rgba(0,0,0,0.3)" : "var(--gold)";
                        
                        document.getElementById('display-player').innerText = player;
                        document.getElementById('display-team').innerText = team;
                        
                        if(num) { 
                            document.getElementById('display-num').innerText = num; 
                            document.getElementById('display-num').style.display = "block"; 
                        }
                        if(logo) { 
                            document.getElementById('team-logo').src = logo; 
                            document.getElementById('logo-container').style.display = "flex"; 
                        }
                        
                        animator.classList.remove('fade-out');
                        animator.classList.add('fade-in');
                    }, 600);
                }, 1800);
            }

            clearTimeout(timer);
            timer = setTimeout(ocultar, 12000);
        }

        function lanzarAgua() {
            clearTimeout(sequence);
            const bar = document.getElementById('notif-bar');
            bar.classList.remove('active');
            void bar.offsetWidth;
            document.getElementById('display-num').style.display = "none";
            document.getElementById('logo-container').style.display = "none";
            document.getElementById('info-box').style.background = "#fff";
            document.getElementById('info-box').style.color = "#000";
            document.getElementById('event-label').className = "event-label bg-agua";
            document.getElementById('event-label').innerText = "TIEMPO";
            document.getElementById('display-player').innerText = "HIDRATACIÓN";
            document.getElementById('display-team').innerText = "PAUSA DE REFRESCO";
            bar.classList.add('active');
            clearTimeout(timer);
            timer = setTimeout(ocultar, 8000);
        }

        function ocultar() { document.getElementById('notif-bar').classList.remove('active'); }
    </script>
</body>
</html>
