<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: transparent; overflow: hidden; display: flex; }
        
        /* --- VISUAL DE TRANSMISIÓN --- */
        .display-area { width: 900px; padding: 50px; display: flex; align-items: center; justify-content: flex-start; height: 100vh;}
        
        .stat-bar { 
            display: flex; align-items: center; 
            opacity: 0; transform: scale(0.8) translateX(-300px); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: absolute;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }
        
        .stat-bar.active { opacity: 1; transform: scale(1) translateX(0); }

        .dorsal {
            width: 45px; height: 45px;
            background: #FFD700; color: #000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 22px;
            margin-right: -25px; z-index: 3;
            border: 3px solid #fff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            display: none;
        }

        .label { 
            color: white; padding: 15px 30px 15px 45px; 
            font-weight: 800; border-radius: 8px 0 0 8px;
            min-width: 140px; text-align: center; text-transform: uppercase; 
            font-size: 14px; z-index: 2; position: relative;
        }
        
        /* Colores de Eventos */
        .bg-gol { background: linear-gradient(90deg, #001f3f, #003366); } 
        .bg-amarilla { background: linear-gradient(90deg, #ffcc00, #e6b800); color: black; }
        .bg-roja { background: linear-gradient(90deg, #ee0000, #cc0000); }
        .bg-falta { background: linear-gradient(90deg, #444, #222); }
        .bg-penal { background: linear-gradient(90deg, #ff4500, #ff0000); border-left: 6px solid #fff; }
        .bg-fuerade { background: linear-gradient(90deg, #556b2f, #228b22); }
        .bg-agua { background: linear-gradient(90deg, #00aaff, #0080ff); }

        .content { 
            background: #fff; color: #1a1a1a; padding: 15px 30px; 
            min-width: 350px; font-weight: 700; font-size: 22px; 
            border-radius: 0 8px 8px 0; border-left: 1px solid #ddd;
            display: flex; flex-direction: column;
        }
        .team-tag { font-size: 12px; color: #666; text-transform: uppercase; margin-top: -2px; }

        /* --- PANEL DE CONTROL --- */
        .admin-panel {
            background: #0f0f0f; color: #fff; padding: 20px; width: 380px;
            height: 100vh; border-left: 4px solid #FFD700; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 10px;
        }
        h3 { color: #FFD700; margin: 0; font-size: 16px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 8px;}
        
        label { display: block; font-size: 10px; color: #888; margin-bottom: 3px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; margin-bottom: 5px; }
        
        .type-select { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
        .type-btn { background: #333; color: #fff; padding: 10px; font-size: 10px; opacity: 0.6; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase;}
        .type-btn.selected { opacity: 1; border: 2px solid #FFD700; background: #444; }

        .btn-lanzar { background: #FFD700; color: #000; width: 100%; padding: 15px; font-weight: 900; border-radius: 6px; cursor: pointer; border: none; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="display-area">
        <div class="stat-bar" id="notif-bar">
            <div id="num-circle" class="dorsal">10</div>
            <div class="label" id="notif-label">GOL</div>
            <div class="content">
                <span id="player-display">Nombre Jugador</span>
                <span id="team-display" class="team-tag">Equipo</span>
            </div>
        </div>
    </div>

    <div class="admin-panel">
        <h3>CONTROLES ABRAZO DE GOL</h3>
        
        <label>1. Selecciona Evento:</label>
        <div class="type-select">
            <button class="type-btn selected" id="t-gol" onclick="selType(' GOL', 'bg-gol', 't-gol')">Gol</button>
            <button class="type-btn" id="t-pen" onclick="selType('🥅 PENAL', 'bg-penal', 't-pen')">Penal</button>
            <button class="type-btn" id="t-fal" onclick="selType('⚠️ FALTA', 'bg-falta', 't-fal')">Falta</button>
            <button class="type-btn" id="t-fue" onclick="selType('🚩 FUERA DE L.', 'bg-fuerade', 't-fue')">Fuera de L.</button>
            <button class="type-btn" id="t-ama" onclick="selType('🟨 AMARILLA', 'bg-amarilla', 't-ama')">T. Amarilla</button>
            <button class="type-btn" id="t-roj" onclick="selType('🟥 ROJA', 'bg-roja', 't-roj')">T. Roja</button>
        </div>

        <label>2. Datos del Protagonista (Opcional):</label>
        <input type="text" id="in-name" placeholder="Nombre (o vacío para general)">
        <div style="display: flex; gap: 5px;">
            <input type="text" id="in-num" placeholder="Dorsal" style="width: 30%;">
            <input type="text" id="in-team" placeholder="Equipo" style="width: 70%;">
        </div>

        <button class="btn-lanzar" onclick="lanzar()">MOSTRAR ALERTA 🚀</button>
        <button style="background: #0080ff; color: #fff; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="lanzarAgua()">💧 HIDRATACIÓN</button>
        
        <button style="background: #222; color: #666; padding: 8px; border: none; margin-top: auto; cursor: pointer; border-radius: 5px;" onclick="ocultar()">OCULTAR</button>
    </div>

    <script>
        let currentType = ' GOL';
        let currentColor = 'bg-gol';
        let timer;
        let sequenceTimer; // Nuevo timer para la secuencia

        const frasesAuto = {
            ' GOL': '¡GOOOOOOOOOOL!',
            '🥅 PENAL': '¡SENTENCIA MÁXIMA!',
            '⚠️ FALTA': '¡HAY INFRACCIÓN!',
            '🚩 FUERA DE L.': '¡POSICIÓN ADELANTADA!',
            '🟨 AMARILLA': '¡TARJETA AMARILLA!',
            '🟥 ROJA': '¡A LAS REGADERAS!'
        };

        function selType(t, c, id) {
            currentType = t;
            currentColor = c;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function lanzar() {
            clearTimeout(sequenceTimer); // Limpiar secuencias previas
            const nom = document.getElementById('in-name').value;
            const num = document.getElementById('in-num').value;
            const team = document.getElementById('in-team').value;

            const playerDisp = document.getElementById('player-display');
            const teamDisp = document.getElementById('team-display');
            const circle = document.getElementById('num-circle');
            const label = document.getElementById('notif-label');

            // 1. Mostrar SIEMPRE la alerta predeterminada primero
            playerDisp.innerText = frasesAuto[currentType];
            teamDisp.innerText = "ABRAZO DE GOL";
            circle.style.display = 'none';
            
            label.innerText = currentType;
            label.className = "label " + currentColor;

            // 2. Si hay un nombre, programar el cambio a los 2 segundos
            if(nom) {
                sequenceTimer = setTimeout(() => {
                    playerDisp.innerText = nom;
                    teamDisp.innerText = team || "ABRAZO DE GOL";
                    if(num) {
                        circle.innerText = num;
                        circle.style.display = 'flex';
                    }
                }, 5000);
            }

            showBar();
        }

        function lanzarAgua() {
            clearTimeout(sequenceTimer);
            document.getElementById('num-circle').style.display = 'none';
            document.getElementById('notif-label').innerText = "TIEMPO";
            document.getElementById('notif-label').className = "label bg-agua";
            document.getElementById('player-display').innerText = "PAUSA DE HIDRATACIÓN";
            document.getElementById('team-display').innerText = "¡Refresquen las ideas!";
            showBar();
        }

        function showBar() {
            clearTimeout(timer);
            const bar = document.getElementById('notif-bar');
            bar.classList.remove('active');
            void bar.offsetWidth;
            bar.classList.add('active');
            timer = setTimeout(ocultar, 20000); 
        }

        function ocultar() {
            document.getElementById('notif-bar').classList.remove('active');
        }
    </script>
</body>
</html>
